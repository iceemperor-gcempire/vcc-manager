// Static inline demos for canvas artboards. The "real" CommandPalette/Notifications
// use position:fixed so don't render inside an artboard — these mirror the design
// statically.
function CommandPaletteDemo() {
  const groups = [
    { label: "프로젝트", items: [
      { name: "Mages",       hint: "124 이미지 · 4 파이프라인", active: true },
      { name: "Cryo",        hint: "88 이미지 · 2 파이프라인" },
    ]},
    { label: "작업판", items: [
      { name: "SDXL T2I — LoRA",    hint: "comfy-01 · 412회 사용" },
      { name: "GPT Image — 1024",   hint: "openai · 187회" },
    ]},
    { label: "명령", items: [
      { name: "새 프로젝트 만들기", hint: "" },
      { name: "다크 모드 토글",    hint: "" },
    ]},
  ];
  return (
    <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.4)", display: "grid", placeItems: "center", padding: 40 }}>
      <div style={{ width: 600, background: "var(--bg-surface)", border: "1px solid var(--border-default)", borderRadius: 12, boxShadow: "var(--shadow-4)", overflow: "hidden", fontFamily: "var(--font-sans)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", borderBottom: "1px solid var(--border-subtle)" }}>
          <Icon.Search style={{ color: "var(--text-tertiary)" }}/>
          <span style={{ flex: 1, fontSize: 16, color: "var(--text-tertiary)" }}>프로젝트 · 작업판 · 명령 검색…</span>
          <span className="kbd">ESC</span>
        </div>
        <div style={{ padding: 6 }}>
          {groups.map((g) => (
            <div key={g.label}>
              <div style={{ padding: "8px 12px 4px", fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em", color: "var(--text-tertiary)" }}>{g.label}</div>
              {g.items.map((it) => (
                <div key={it.name} style={{
                  display: "flex", alignItems: "center", gap: 10,
                  padding: "8px 12px", borderRadius: 6,
                  background: it.active ? "var(--accent-3)" : "transparent",
                  color: it.active ? "var(--accent-11)" : "var(--text-primary)",
                }}>
                  <div style={{ width: 22, height: 22, borderRadius: 4, background: it.active ? "var(--accent-9)" : "var(--bg-subtle)", color: it.active ? "white" : "var(--text-secondary)", display: "grid", placeItems: "center" }}>
                    {g.label === "프로젝트" ? <Icon.Folder size={14}/> : g.label === "작업판" ? <Icon.Cube size={14}/> : <Icon.Plus size={14}/>}
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13, fontWeight: 500 }}>{it.name}</div>
                    {it.hint && <div style={{ fontSize: 11, color: it.active ? "var(--accent-11)" : "var(--text-tertiary)", opacity: 0.85, marginTop: 1 }}>{it.hint}</div>}
                  </div>
                  {it.active && <Icon.ArrowRight size={14}/>}
                </div>
              ))}
            </div>
          ))}
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "8px 14px", borderTop: "1px solid var(--border-subtle)", background: "var(--bg-tint)", fontSize: 11, color: "var(--text-tertiary)" }}>
          <span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}><span className="kbd">↑</span><span className="kbd">↓</span> 이동</span>
          <span style={{ display: "inline-flex", alignItems: "center", gap: 4 }}><span className="kbd">↵</span> 선택</span>
          <span style={{ flex: 1 }}/>
          <span style={{ fontFamily: "var(--font-mono)" }}>6개 결과</span>
        </div>
      </div>
    </div>
  );
}

function NotificationsDemo() {
  const sample = [
    { tone: "success", time: "방금", title: "파이프라인 'NPC 생성' 완료", body: "Mages · 4장 생성 · 2분 35초", action: "결과 보기" },
    { tone: "warning", time: "5분 전", title: "local-llama 서버 응답 지연", body: "5건 큐 누적 · GPU 100%", action: "서버 확인" },
    { tone: "info",    time: "12분 전", title: "파이프라인 '배경 시리즈 v3' 시작", body: "Cryo · 4단계 · 백그라운드 실행" },
  ];
  return (
    <div style={{
      width: 380, margin: "auto",
      background: "var(--bg-surface)",
      border: "1px solid var(--border-default)",
      borderRadius: 10,
      boxShadow: "var(--shadow-3)",
      overflow: "hidden",
      fontFamily: "var(--font-sans)",
    }}>
      <div style={{ padding: "12px 14px", borderBottom: "1px solid var(--border-subtle)", display: "flex", alignItems: "center", gap: 8 }}>
        <Icon.Bell/>
        <span style={{ fontSize: 14, fontWeight: 600 }}>알림</span>
        <span className="chip chip--accent chip--tag">3 new</span>
        <span style={{ flex: 1 }}/>
        <span style={{ fontSize: 11, color: "var(--text-tertiary)" }}>모두 읽음</span>
      </div>
      <div style={{ padding: "8px 14px 4px", fontSize: 10, fontWeight: 600, textTransform: "uppercase", letterSpacing: "0.08em", color: "var(--text-tertiary)" }}>새 알림</div>
      {sample.map((n, i) => (
        <div key={i} style={{ padding: "12px 14px", borderBottom: "1px solid var(--border-subtle)", display: "flex", gap: 10, alignItems: "flex-start" }}>
          <div style={{ width: 28, height: 28, borderRadius: 8, background: `var(--${n.tone}-3)`, color: `var(--${n.tone}-11)`, display: "grid", placeItems: "center", flex: "0 0 auto" }}>
            {n.tone === "success" ? <Icon.Check/> : n.tone === "warning" ? <Icon.Info/> : <Icon.Spinner/>}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", gap: 6 }}>
              <span style={{ fontSize: 12.5, fontWeight: 600, flex: 1, textWrap: "pretty" }}>{n.title}</span>
              <span style={{ fontSize: 10.5, color: "var(--text-tertiary)", fontFamily: "var(--font-mono)", flex: "0 0 auto" }}>{n.time}</span>
            </div>
            <div style={{ fontSize: 11.5, color: "var(--text-secondary)", marginTop: 2, lineHeight: 1.55 }}>{n.body}</div>
            {n.action && <a href="#" style={{ display: "inline-block", marginTop: 6, fontSize: 11.5, color: "var(--accent-11)", textDecoration: "none", fontWeight: 500 }}>{n.action} →</a>}
          </div>
        </div>
      ))}
      <div style={{ padding: "8px 14px", background: "var(--bg-tint)", fontSize: 12, textAlign: "center" }}>
        <span style={{ color: "var(--accent-11)", fontWeight: 500 }}>모든 알림 보기 →</span>
      </div>
    </div>
  );
}

// Page artboard wrapper — fixed pixel size scrollless surface
function PageArtboard({ children, mobile }) {
  return (
    <div style={{
      width: "100%", height: "100%",
      background: "var(--bg-canvas)",
      fontFamily: "var(--font-sans)",
      color: "var(--text-primary)",
      overflow: "hidden",
    }}>
      {children}
    </div>
  );
}

                정돈된 회색 슬레이트 사이드바, Pretendard 한글 가독성, 그리고 정보 밀도와 여백의 균형을
